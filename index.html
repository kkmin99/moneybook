<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>억을모으자</title>
  <meta name="theme-color" id="theme-color" content="#3182F6" />
  <!-- 테마 초기화: CSS보다 먼저 실행돼 화면 깜빡임(FOUC) 방지 -->
  <script>
    (function () {
      try {
        var db = JSON.parse(localStorage.getItem('moneybook.v1') || '{}');
        var t = (db.settings && db.settings.theme) || 'system';
        var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('theme-dark', dark);
      } catch (e) {}
    })();
  </script>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="억을모으자" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <main id="view"></main>

    <nav id="tabbar">
      <button class="tab" data-tab="home" aria-label="캘린더">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="3"/><path d="M3 9h18M8 3v3M16 3v3"/><circle cx="8" cy="13.5" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="13.5" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="13.5" r="1" fill="currentColor" stroke="none"/></svg>
        <span>캘린더</span>
      </button>
      <button class="tab" data-tab="list" aria-label="내역">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1.1" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.1" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.1" fill="currentColor" stroke="none"/></svg>
        <span>내역</span>
      </button>
      <button id="fab" aria-label="입력 추가">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="tab" data-tab="stats" aria-label="통계">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 20V10M12 20V4M19 20v-6"/></svg>
        <span>통계</span>
      </button>
      <button class="tab" data-tab="more" aria-label="더보기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="2"/><rect x="13.5" y="3.5" width="7" height="7" rx="2"/><rect x="3.5" y="13.5" width="7" height="7" rx="2"/><rect x="13.5" y="13.5" width="7" height="7" rx="2"/></svg>
        <span>더보기</span>
      </button>
    </nav>
  </div>

  <div id="sheet" class="sheet hidden" aria-hidden="true"></div>
  <div id="backdrop" class="backdrop hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
